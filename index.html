<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Entregas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🚚 Simulador de Entregas (FIFO)</h1>

    <div class="container">
        <button onclick="adicionarPacote()">Adicionar Pacote</button>
        <button onclick="entregarPacote()">Entregar Pacote</button>
    </div>

    <h2>📦 Fila de Entregas</h2>
    <ul id="fila"></ul>

    <h2>✅ Histórico de Entregas</h2>
    <ul id="historico"></ul>

    <div id="animacao">🚚</div>

    <h2>📍 Status da Entrega</h2>

<div id="statusBox">
    <p id="statusTexto">Aguardando ação...</p>
    <p id="tempoEstimado"></p>

    <div id="barraContainer">
        <div id="barraProgresso"></div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
